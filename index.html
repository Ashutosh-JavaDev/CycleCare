<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CycleCare — modern menstrual health tracking for students. Predictions, symptom logging, AI guidance and community support." />
    <meta name="theme-color" content="#ec4899" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ec4899'%3E%3Cpath d='M12 21s-7-4.5-9.5-9C.8 8.7 2.5 4 6.5 4c2 0 3.5 1 4.5 2.5C12 5 13.5 4 15.5 4 19.5 4 21.2 8.7 19.5 12c-2.5 4.5-7.5 9-7.5 9z'/%3E%3C/svg%3E" />
    <title>CycleCare — Modern Menstrual Health Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // Apply persisted theme before paint to avoid flash of wrong theme
      (function () {
        try {
          var saved = localStorage.getItem('cyclecare-theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = saved ? saved === 'dark' : prefersDark;
          var root = document.documentElement;
          if (dark) { root.classList.add('dark'); root.setAttribute('data-theme', 'dark'); root.style.colorScheme = 'dark'; }
          else { root.setAttribute('data-theme', 'light'); root.style.colorScheme = 'light'; }
          // Disable transitions during initial paint, then re-enable
          root.classList.add('preload');
          window.addEventListener('load', function () {
            requestAnimationFrame(function () { root.classList.remove('preload'); });
          });
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
